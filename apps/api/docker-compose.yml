services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_todo
      POSTGRES_USER: ai_todo
      POSTGRES_PASSWORD: ai_todo
    ports:
      - "5432:5432"
    volumes:
      - ai_todo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_todo -d ai_todo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ai_todo_postgres:
