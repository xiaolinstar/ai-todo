apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/name: ai-todo-api
    app.kubernetes.io/part-of: ai-todo
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-todo-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-todo-api
        app.kubernetes.io/part-of: ai-todo
        app.kubernetes.io/component: backend
        app.kubernetes.io/managed-by: kustomize
    spec:
      containers:
        - name: api
          image: ghcr.io/xiaolinstar/ai-todo-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ai-todo-config
            - secretRef:
                name: ai-todo-secrets
          ports:
            - containerPort: 3100
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          startupProbe:
            httpGet:
              path: /v1/health
              port: 3100
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
