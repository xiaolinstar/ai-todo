apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app.kubernetes.io/name: ai-todo-worker
    app.kubernetes.io/part-of: ai-todo
    app.kubernetes.io/component: worker
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-todo-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-todo-worker
        app.kubernetes.io/part-of: ai-todo
        app.kubernetes.io/component: worker
        app.kubernetes.io/managed-by: kustomize
    spec:
      containers:
        - name: worker
          image: ghcr.io/xiaolinstar/ai-todo-api:latest
          imagePullPolicy: IfNotPresent
          args:
            - python
            - -m
            - ai_todo_api.modules.notifications.worker
          envFrom:
            - configMapRef:
                name: ai-todo-config
            - secretRef:
                name: ai-todo-secrets
          env:
            - name: AI_TODO_SKIP_MIGRATIONS
              value: "true"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - python
                - /app/scripts/worker_healthcheck.py
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
