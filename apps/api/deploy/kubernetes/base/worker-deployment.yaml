apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/xiaolinstar/ai-todo-api:latest
          imagePullPolicy: IfNotPresent
          args:
            - python
            - -m
            - ai_todo_api.modules.notifications.worker
          envFrom:
            - configMapRef:
                name: ai-todo-config
            - secretRef:
                name: ai-todo-secrets
          env:
            - name: AI_TODO_SKIP_MIGRATIONS
              value: "true"
          livenessProbe:
            exec:
              command:
                - python
                - /app/scripts/worker_healthcheck.py
            failureThreshold: 3
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 5
      restartPolicy: Always
