# Production stack: PostgreSQL + API
# Usage:
#   cp .env.production.example .env.production
#   # edit secrets in .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_todo}
      POSTGRES_USER: ${POSTGRES_USER:-ai_todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - ai_todo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_todo} -d ${POSTGRES_DB:-ai_todo}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    # CD sets AI_TODO_API_IMAGE from deploy-manifest (GHCR digest); local deploy leaves empty → build
    image: ${AI_TODO_API_IMAGE:-}
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.cloud.tencent.com/pypi/simple}
        APT_MIRROR: ${APT_MIRROR:-mirrors.tencent.com}
    environment:
      AI_TODO_HOST: 0.0.0.0
      AI_TODO_PORT: ${AI_TODO_PORT:-3100}
      POSTGRES_USER: ${POSTGRES_USER:-ai_todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-ai_todo}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      # 可选：完整 URL 覆盖（密码含 @/# 等时 entrypoint 会自动编码，一般无需手动设置）
      AI_TODO_DATABASE_URL: ${AI_TODO_DATABASE_URL:-}
      AI_TODO_ALLOW_DEV_AUTH: ${AI_TODO_ALLOW_DEV_AUTH:-false}
      AI_TODO_TIMEZONE: ${AI_TODO_TIMEZONE:-Asia/Shanghai}
      AI_TODO_WECHAT_APP_ID: ${AI_TODO_WECHAT_APP_ID:-}
      AI_TODO_WECHAT_APP_SECRET: ${AI_TODO_WECHAT_APP_SECRET:-}
      AI_TODO_WECHAT_REMINDER_TEMPLATE_ID: ${AI_TODO_WECHAT_REMINDER_TEMPLATE_ID:-}
      AI_TODO_RATE_LIMIT_ENABLED: ${AI_TODO_RATE_LIMIT_ENABLED:-true}
      AI_TODO_RATE_LIMIT_WECHAT_LOGIN_PER_MINUTE: ${AI_TODO_RATE_LIMIT_WECHAT_LOGIN_PER_MINUTE:-10}
      AI_TODO_RELEASE_TAG: ${AI_TODO_RELEASE_TAG:-}
      AI_TODO_GIT_SHA: ${AI_TODO_GIT_SHA:-}
      AI_TODO_ICP_BEIAN_TEXT: ${AI_TODO_ICP_BEIAN_TEXT:-苏ICP备2026011017号-7}
      AI_TODO_PUBLIC_SECURITY_BEIAN_TEXT: ${AI_TODO_PUBLIC_SECURITY_BEIAN_TEXT:-苏公网安备32010602012480号}
    ports:
      # 宿主机 :8082 → 容器 :3100（AI_TODO_PUBLISH_PORT 来自 .env.production）
      - "${AI_TODO_PUBLISH_PORT:-8082}:${AI_TODO_PORT:-3100}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    profiles: ["notifications"]
    image: ${AI_TODO_API_IMAGE:-}
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.cloud.tencent.com/pypi/simple}
        APT_MIRROR: ${APT_MIRROR:-mirrors.tencent.com}
    command: ["python", "-m", "ai_todo_api.modules.notifications.worker"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-ai_todo}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      AI_TODO_DATABASE_URL: ${AI_TODO_DATABASE_URL:-}
      AI_TODO_ALLOW_DEV_AUTH: ${AI_TODO_ALLOW_DEV_AUTH:-false}
      AI_TODO_TIMEZONE: ${AI_TODO_TIMEZONE:-Asia/Shanghai}
      AI_TODO_WECHAT_APP_ID: ${AI_TODO_WECHAT_APP_ID:-}
      AI_TODO_WECHAT_APP_SECRET: ${AI_TODO_WECHAT_APP_SECRET:-}
      AI_TODO_WECHAT_REMINDER_TEMPLATE_ID: ${AI_TODO_WECHAT_REMINDER_TEMPLATE_ID:-}
      AI_TODO_NOTIFICATION_WORKER_POLL_SECONDS: ${AI_TODO_NOTIFICATION_WORKER_POLL_SECONDS:-30}
      AI_TODO_NOTIFICATION_WORKER_BATCH_SIZE: ${AI_TODO_NOTIFICATION_WORKER_BATCH_SIZE:-50}
      AI_TODO_NOTIFICATION_MAX_ATTEMPTS: ${AI_TODO_NOTIFICATION_MAX_ATTEMPTS:-3}
      AI_TODO_RELEASE_TAG: ${AI_TODO_RELEASE_TAG:-}
      AI_TODO_GIT_SHA: ${AI_TODO_GIT_SHA:-}
      AI_TODO_ICP_BEIAN_TEXT: ${AI_TODO_ICP_BEIAN_TEXT:-苏ICP备2026011017号-7}
      AI_TODO_PUBLIC_SECURITY_BEIAN_TEXT: ${AI_TODO_PUBLIC_SECURITY_BEIAN_TEXT:-苏公网安备32010602012480号}
      AI_TODO_SKIP_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ai_todo_postgres_data:
