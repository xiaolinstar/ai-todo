name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - production
          - staging
        default: production
      ci_run_id:
        description: Optional CI workflow run ID for rollback or explicit deploy. Leave empty for normal tag-based release.
        type: string
        required: false
      release_tag:
        description: Release tag to deploy, e.g. v0.2.3. Required unless ci_run_id is set.
        type: string
        required: false
      deploy_mode:
        description: VPS deploy strategy (auto = docker pull, fallback server-build on pull failure)
        type: choice
        options:
          - auto
          - pull
          - server-build
        default: auto

# actions:read is required to find/download deploy-manifest from the selected CI run
permissions:
  actions: read
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.11"

concurrency:
  group: cd-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  resolve-manifest:
    name: 1 · Resolve manifest
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.manifest.outputs.git_sha }}
      api_image: ${{ steps.manifest.outputs.api_image }}
      fingerprint: ${{ steps.manifest.outputs.fingerprint }}
      ci_run_id: ${{ steps.ci_run.outputs.run_id }}
      target_sha: ${{ steps.ci_run.outputs.target_sha }}
      release_tag: ${{ steps.ci_run.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve CI run id
        id: ci_run
        env:
          INPUT_RUN_ID: ${{ github.event.inputs.ci_run_id }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/cd/resolve-ci-run.mjs

      - name: Download deploy-manifest from CI
        uses: actions/download-artifact@v7
        with:
          name: deploy-manifest
          run-id: ${{ steps.ci_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: manifest

      - name: Verify manifest fingerprint
        run: python3 scripts/ci/verify_deploy_manifest.py manifest/deploy-manifest.json

      - name: Export manifest fields
        id: manifest
        env:
          TARGET_SHA: ${{ steps.ci_run.outputs.target_sha }}
        run: node scripts/cd/export-manifest-fields.mjs manifest/deploy-manifest.json

      - name: Stage verified manifest for deploy job
        uses: actions/upload-artifact@v6
        with:
          name: cd-deploy-manifest
          path: manifest/deploy-manifest.json
          retention-days: 7

      - name: Staging environment notice
        if: github.event.inputs.environment == 'staging'
        run: |
          echo "::notice::Staging deploy selected. Ensure GitHub Environment 'staging' has independent DEPLOY_* and CD_PUBLIC_API_URL secrets before using it for release validation."

  classify-release:
    name: 2 · Classify release
    needs: [resolve-manifest]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    outputs:
      release_class: ${{ steps.classify.outputs.release_class }}
      has_schema_changes: ${{ steps.classify.outputs.has_schema_changes }}
      has_db_runtime_changes: ${{ steps.classify.outputs.has_db_runtime_changes }}
      has_infra_changes: ${{ steps.classify.outputs.has_infra_changes }}
      db_backup_recommended: ${{ steps.classify.outputs.db_backup_recommended }}
      current_git_sha: ${{ steps.classify.outputs.current_git_sha }}
      compare_base: ${{ steps.classify.outputs.compare_base }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Classify release changes
        id: classify
        env:
          TARGET_SHA: ${{ needs.resolve-manifest.outputs.git_sha }}
          CD_PUBLIC_API_URL: ${{ vars.CD_PUBLIC_API_URL || secrets.CD_PUBLIC_API_URL }}
          CD_CLASSIFICATION_DIR: cd-report
        run: node scripts/cd/classify-release.mjs

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cd-release-classification
          path: cd-report/
          retention-days: 30

  deploy:
    name: 3 · Deploy
    needs: [resolve-manifest, classify-release]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Check deploy configuration
        id: deploy_config
        env:
          CD_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          DEPLOY_HOST_PRESENT: ${{ vars.DEPLOY_HOST != '' || secrets.DEPLOY_HOST != '' }}
          DEPLOY_USER_PRESENT: ${{ vars.DEPLOY_USER != '' || secrets.DEPLOY_USER != '' }}
          DEPLOY_SSH_KEY_PRESENT: ${{ secrets.DEPLOY_SSH_KEY != '' }}
          DEPLOY_PASSWORD_PRESENT: ${{ secrets.DEPLOY_PASSWORD != '' }}
        run: node scripts/cd/check-deploy-config.mjs

      - name: Download verified manifest
        if: steps.deploy_config.outputs.configured == 'true'
        uses: actions/download-artifact@v7
        with:
          name: cd-deploy-manifest
          path: manifest

      - name: Copy manifest to server
        if: steps.deploy_config.outputs.configured == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          source: manifest/deploy-manifest.json
          target: /tmp/
          strip_components: 1
          overwrite: true

      - name: Deploy to VPS
        if: steps.deploy_config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          FINGERPRINT: ${{ needs.resolve-manifest.outputs.fingerprint }}
          CI_RUN_ID: ${{ needs.resolve-manifest.outputs.ci_run_id }}
          RELEASE_TAG: ${{ needs.resolve-manifest.outputs.release_tag }}
          GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN || github.token }}
          GHCR_DEPLOY_USER: ${{ vars.GHCR_DEPLOY_USER || secrets.GHCR_DEPLOY_USER || github.actor }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
          DEPLOY_MODE_INPUT: ${{ github.event.inputs.deploy_mode || 'auto' }}
          CD_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          envs: FINGERPRINT,CI_RUN_ID,RELEASE_TAG,GHCR_DEPLOY_TOKEN,GHCR_DEPLOY_USER,DEPLOY_PATH,DEPLOY_MODE_INPUT,CD_ENVIRONMENT
          command_timeout: 10m
          script_stop: true
          script: |
            DEPLOY_PATH="${DEPLOY_PATH:-$HOME/AgentProjects/ai-todo}"
            cd "$DEPLOY_PATH"
            git fetch --prune origin main
            git pull --ff-only origin main
            export AI_TODO_DEPLOY_MANIFEST=/tmp/deploy-manifest.json
            export AI_TODO_RELEASE_TAG="$RELEASE_TAG"
            export AI_TODO_CD_ACTION=deploy
            bash apps/api/deploy/cd-bootstrap.sh

  post-deploy-verify:
    name: 4 · Verify (public API)
    needs: [resolve-manifest, deploy]
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    outputs:
      verify_error: ${{ steps.verify.outputs.error }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          name: cd-deploy-manifest
          path: manifest

      - name: Run post-deploy smoke / black-box checks
        id: verify
        env:
          CD_PUBLIC_API_URL: ${{ vars.CD_PUBLIC_API_URL || secrets.CD_PUBLIC_API_URL }}
          CD_SMOKE_PAT: ${{ secrets.CD_SMOKE_PAT }}
          RELEASE_TAG: ${{ needs.resolve-manifest.outputs.release_tag }}
        run: >
          python3 scripts/cd/post-deploy-verify.py
          --expect-git-sha "${{ needs.resolve-manifest.outputs.git_sha }}"
          --release-tag "${{ needs.resolve-manifest.outputs.release_tag }}"
          --json-out cd-report/verify-result.json

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cd-verify-result
          path: cd-report/
          retention-days: 14

  publish-accepted:
    name: 5a · Outcome published
    needs: [post-deploy-verify]
    if: needs.post-deploy-verify.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Release accepted
        run: |
          echo "::notice title=Release published::Public API verification passed. This version is live."

  deploy-failed:
    name: 5c · Outcome deploy failed
    needs: [deploy]
    if: needs.deploy.result != 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy did not complete
        run: |
          echo "::error title=Deploy failed::Deploy job did not succeed. Rollback branch was not run."

  rollback:
    name: 5b · Rollback
    needs: [deploy, post-deploy-verify]
    if: ${{ always() && needs.deploy.result == 'success' && needs.post-deploy-verify.result == 'failure' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Check deploy configuration
        id: deploy_config
        env:
          CD_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          DEPLOY_HOST_PRESENT: ${{ vars.DEPLOY_HOST != '' || secrets.DEPLOY_HOST != '' }}
          DEPLOY_USER_PRESENT: ${{ vars.DEPLOY_USER != '' || secrets.DEPLOY_USER != '' }}
          DEPLOY_SSH_KEY_PRESENT: ${{ secrets.DEPLOY_SSH_KEY != '' }}
          DEPLOY_PASSWORD_PRESENT: ${{ secrets.DEPLOY_PASSWORD != '' }}
        run: node scripts/cd/check-deploy-config.mjs

      - name: Rollback on VPS
        if: steps.deploy_config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN || github.token }}
          GHCR_DEPLOY_USER: ${{ vars.GHCR_DEPLOY_USER || secrets.GHCR_DEPLOY_USER || github.actor }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
          CD_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          envs: GHCR_DEPLOY_TOKEN,GHCR_DEPLOY_USER,DEPLOY_PATH,CD_ENVIRONMENT
          command_timeout: 10m
          script_stop: true
          script: |
            DEPLOY_PATH="${DEPLOY_PATH:-$HOME/AgentProjects/ai-todo}"
            cd "$DEPLOY_PATH"
            git fetch --prune origin main
            git pull --ff-only origin main
            export AI_TODO_CD_ACTION=rollback
            bash apps/api/deploy/cd-bootstrap.sh

  post-rollback-verify:
    name: 6b · Verify after rollback
    needs: [rollback]
    if: ${{ needs.rollback.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v5

      - name: Verify API after rollback
        env:
          CD_PUBLIC_API_URL: ${{ vars.CD_PUBLIC_API_URL || secrets.CD_PUBLIC_API_URL }}
          CD_SMOKE_PAT: ${{ secrets.CD_SMOKE_PAT }}
        run: >
          python3 scripts/cd/post-deploy-verify.py
          --skip-git-sha-check
          --json-out cd-report/verify-after-rollback.json

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cd-verify-after-rollback
          path: cd-report/
          retention-days: 14

  release-not-adopted:
    name: 7b · Outcome not adopted
    needs: [rollback, post-rollback-verify]
    if: ${{ needs.rollback.result == 'success' && needs.post-rollback-verify.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Rolled back to previous version
        run: |
          echo "::warning title=Release not adopted::Post-deploy checks failed; production was rolled back to the previous version."

  release-report:
    name: 8 · Release report
    needs:
      - resolve-manifest
      - classify-release
      - deploy
      - post-deploy-verify
      - publish-accepted
      - deploy-failed
      - rollback
      - post-rollback-verify
      - release-not-adopted
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v5

      - name: Write release report
        env:
          CD_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          CD_RELEASE_TAG: ${{ needs.resolve-manifest.outputs.release_tag }}
          CD_GIT_SHA: ${{ needs.resolve-manifest.outputs.git_sha }}
          CD_FINGERPRINT: ${{ needs.resolve-manifest.outputs.fingerprint }}
          CD_CI_RUN_ID: ${{ needs.resolve-manifest.outputs.ci_run_id }}
          CD_RELEASE_CLASS: ${{ needs.classify-release.outputs.release_class }}
          CD_HAS_SCHEMA_CHANGES: ${{ needs.classify-release.outputs.has_schema_changes }}
          CD_HAS_DB_RUNTIME_CHANGES: ${{ needs.classify-release.outputs.has_db_runtime_changes }}
          CD_HAS_INFRA_CHANGES: ${{ needs.classify-release.outputs.has_infra_changes }}
          CD_DB_BACKUP_RECOMMENDED: ${{ needs.classify-release.outputs.db_backup_recommended }}
          CD_CURRENT_GIT_SHA: ${{ needs.classify-release.outputs.current_git_sha }}
          CD_COMPARE_BASE: ${{ needs.classify-release.outputs.compare_base }}
          CD_PUBLIC_API_URL: ${{ vars.CD_PUBLIC_API_URL || secrets.CD_PUBLIC_API_URL }}
          CD_STEP_RESOLVE_MANIFEST: ${{ needs.resolve-manifest.result }}
          CD_STEP_CLASSIFY_RELEASE: ${{ needs.classify-release.result }}
          CD_STEP_DEPLOY: ${{ needs.deploy.result }}
          CD_STEP_POST_DEPLOY_VERIFY: ${{ needs.post-deploy-verify.result }}
          CD_STEP_ROLLBACK: ${{ needs.rollback.result }}
          CD_STEP_POST_ROLLBACK_VERIFY: ${{ needs.post-rollback-verify.result }}
          CD_STEP_PUBLISH_ACCEPTED: ${{ needs.publish-accepted.result }}
          CD_STEP_DEPLOY_FAILED: ${{ needs.deploy-failed.result }}
          CD_STEP_RELEASE_NOT_ADOPTED: ${{ needs.release-not-adopted.result }}
          CD_VERIFY_ERROR: ${{ needs.post-deploy-verify.outputs.verify_error }}
          CD_REPORT_DIR: cd-report
        run: node scripts/cd/write-release-report.mjs

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cd-release-report
          path: cd-report/
          retention-days: 30
