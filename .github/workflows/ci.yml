name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # GitHub Actions runner: use Node 24 for action runtimes (Node 20 deprecation)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ghcr.io/xiaolinstar/ai-todo-api

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 1 · Code scan (static analysis, no build artifacts)
  # ═══════════════════════════════════════════════════════════════════════════

  scan-node:
    name: "1-scan · Node typecheck & lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm --filter @xiaolinstar/ai-todo-cli build
      - run: pnpm mcp:build
      - run: pnpm mcp:smoke
      - name: Verify deploy manifest tooling
        run: node scripts/ci/smoke-deploy-manifest.mjs

  scan-miniapp:
    name: "1-scan · Miniapp typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:wechat

  scan-api:
    name: "1-scan · API ruff"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests
      - run: python scripts/check_alembic_migrations.py

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 2 · Build (compile / image; outputs become CD inputs)
  # ═══════════════════════════════════════════════════════════════════════════

  build-node:
    name: "2-build · Node packages"
    needs: [scan-node]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "./packages/*" --filter "@xiaolinstar/ai-todo-cli" -r build

  build-miniapp:
    name: "2-build · WeChat miniapp dist"
    needs: [scan-miniapp]
    runs-on: ubuntu-latest
    outputs:
      artifact_digest: ${{ steps.miniapp_artifact.outputs.artifact-digest }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:wechat

      - uses: actions/upload-artifact@v6
        id: miniapp_artifact
        with:
          name: miniapp-dist
          path: |
            apps/miniapp/miniprogram
            apps/miniapp/project.config.json
            apps/miniapp/tsconfig.json
            apps/miniapp/types
          retention-days: 30

  build-api-image:
    name: "2-build · API container image"
    needs: [scan-api]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.API_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=ai-todo API
            org.opencontainers.image.description=FastAPI service for ai-todo
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: apps/api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PIP_INDEX_URL=https://pypi.org/simple

      - name: Write image metadata (PR build-only)
        if: github.event_name == 'pull_request'
        env:
          API_IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_PUSHED: "false"
        run: node scripts/ci/write-api-image-metadata.mjs

      - uses: actions/upload-artifact@v6
        if: github.event_name == 'pull_request'
        with:
          name: api-image-metadata
          path: api-image-metadata.json
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 3 · Unit / integration tests
  # ═══════════════════════════════════════════════════════════════════════════

  test-api:
    name: "3-test · API pytest"
    needs: [scan-api]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 4 · Publish deploy manifest (main only; fingerprint for CD)
  # ═══════════════════════════════════════════════════════════════════════════

  publish-manifest:
    name: "4-publish · Deploy manifest"
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs:
      - scan-node
      - scan-miniapp
      - scan-api
      - build-node
      - build-miniapp
      - build-api-image
      - test-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Publish deploy manifest
        env:
          API_IMAGE: ${{ env.API_IMAGE_NAME }}@${{ needs.build-api-image.outputs.digest }}
          API_IMAGE_DIGEST: ${{ needs.build-api-image.outputs.digest }}
          MINIAPP_ARTIFACT_SHA: ${{ needs.build-miniapp.outputs.artifact_digest }}
        run: node scripts/ci/write-deploy-manifest.mjs

      - uses: actions/upload-artifact@v6
        with:
          name: deploy-manifest
          path: deploy-manifest.json
          retention-days: 90
