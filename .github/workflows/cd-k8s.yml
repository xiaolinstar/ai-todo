name: CD (K8s)

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: Optional CI workflow run ID. Leave empty to resolve from release_tag.
        type: string
        required: false
      release_tag:
        description: Release tag to deploy, e.g. v0.2.3. Required unless ci_run_id is set.
        type: string
        required: false

permissions:
  actions: read
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.11"

concurrency:
  group: cd-k8s-production-k8s
  cancel-in-progress: false

jobs:
  resolve-manifest:
    name: 1 · Resolve manifest
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.manifest.outputs.git_sha }}
      api_image: ${{ steps.manifest.outputs.api_image }}
      fingerprint: ${{ steps.manifest.outputs.fingerprint }}
      ci_run_id: ${{ steps.ci_run.outputs.run_id }}
      target_sha: ${{ steps.ci_run.outputs.target_sha }}
      release_tag: ${{ steps.ci_run.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve CI run id
        id: ci_run
        env:
          INPUT_RUN_ID: ${{ github.event.inputs.ci_run_id }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/cd/resolve-ci-run.mjs

      - name: Download deploy-manifest from CI
        uses: actions/download-artifact@v7
        with:
          name: deploy-manifest
          run-id: ${{ steps.ci_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: manifest

      - name: Verify manifest fingerprint
        run: python3 scripts/ci/verify_deploy_manifest.py manifest/deploy-manifest.json

      - name: Export manifest fields
        id: manifest
        env:
          TARGET_SHA: ${{ steps.ci_run.outputs.target_sha }}
        run: node scripts/cd/export-manifest-fields.mjs manifest/deploy-manifest.json

      - uses: actions/upload-artifact@v6
        with:
          name: cd-k8s-deploy-manifest
          path: manifest/deploy-manifest.json
          retention-days: 7

  deploy:
    name: 2 · Deploy (K8s)
    needs: [resolve-manifest]
    runs-on: ubuntu-latest
    environment: production-k8s
    steps:
      - uses: actions/checkout@v6

      - name: Check deploy configuration
        id: deploy_config
        env:
          CD_ENVIRONMENT: production-k8s
          DEPLOY_HOST_PRESENT: ${{ vars.DEPLOY_HOST != '' || secrets.DEPLOY_HOST != '' }}
          DEPLOY_USER_PRESENT: ${{ vars.DEPLOY_USER != '' || secrets.DEPLOY_USER != '' }}
          DEPLOY_SSH_KEY_PRESENT: ${{ secrets.DEPLOY_SSH_KEY != '' }}
          DEPLOY_PASSWORD_PRESENT: ${{ secrets.DEPLOY_PASSWORD != '' }}
        run: node scripts/cd/check-deploy-config.mjs

      - name: Download verified manifest
        if: steps.deploy_config.outputs.configured == 'true'
        uses: actions/download-artifact@v7
        with:
          name: cd-k8s-deploy-manifest
          path: manifest

      - name: Copy manifest to server
        if: steps.deploy_config.outputs.configured == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          source: manifest/deploy-manifest.json
          target: /tmp/
          strip_components: 1
          overwrite: true

      - name: Deploy to K8s host
        if: steps.deploy_config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.5
        env:
          FINGERPRINT: ${{ needs.resolve-manifest.outputs.fingerprint }}
          CI_RUN_ID: ${{ needs.resolve-manifest.outputs.ci_run_id }}
          RELEASE_TAG: ${{ needs.resolve-manifest.outputs.release_tag }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
          K8S_OVERLAY: ${{ vars.K8S_OVERLAY || 'apps/api/deploy/k8s/overlays/production' }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'ai-todo' }}
          K8S_REGISTRY_MIRROR: ${{ vars.K8S_REGISTRY_MIRROR || 'ghcr.nju.edu.cn' }}
          CD_LOCAL_HEALTH_URL: ${{ vars.CD_LOCAL_HEALTH_URL || 'http://127.0.0.1:30082' }}
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          envs: FINGERPRINT,CI_RUN_ID,RELEASE_TAG,DEPLOY_PATH,K8S_OVERLAY,K8S_NAMESPACE,K8S_REGISTRY_MIRROR,CD_LOCAL_HEALTH_URL
          command_timeout: 15m
          script: |
            DEPLOY_PATH="${DEPLOY_PATH:-$HOME/AgentProjects/ai-todo}"
            DEPLOY_PATH="${DEPLOY_PATH//\$HOME/$HOME}"
            cd "$DEPLOY_PATH"
            git fetch --prune origin main
            git reset --hard origin/main
            export AI_TODO_DEPLOY_MANIFEST=/tmp/deploy-manifest.json
            export AI_TODO_RELEASE_TAG="$RELEASE_TAG"
            export KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}"
            bash apps/api/deploy/cd-k8s-bootstrap.sh

  verify:
    name: 3 · Verify (local NodePort)
    needs: [resolve-manifest, deploy]
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    environment: production-k8s
    steps:
      - name: Verify health on K8s host
        uses: appleboy/ssh-action@v1.2.5
        env:
          CD_LOCAL_HEALTH_URL: ${{ vars.CD_LOCAL_HEALTH_URL || 'http://127.0.0.1:30082' }}
          EXPECT_GIT_SHA: ${{ needs.resolve-manifest.outputs.git_sha }}
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          envs: CD_LOCAL_HEALTH_URL,EXPECT_GIT_SHA
          script: |
            base="${CD_LOCAL_HEALTH_URL%/}"
            curl -fsS "${base}/v1/health" | python3 -c "
            import json, sys, os
            p = json.load(sys.stdin)
            exp = os.environ['EXPECT_GIT_SHA'].strip().lower()
            act = (p.get('gitSha') or '').strip().lower()
            assert act, 'missing gitSha'
            assert act == exp or act.startswith(exp[:7]), f'gitSha {act} != {exp}'
            print('verify ok', act)
            "
            curl -fsS "${base}/v1/health/db" >/dev/null
            echo "db health ok"

  publish-accepted:
    name: 4 · Outcome published
    needs: [verify]
    if: needs.verify.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: K8s release accepted
        run: echo "::notice title=K8s release published::Local NodePort verification passed on production-k8s."
