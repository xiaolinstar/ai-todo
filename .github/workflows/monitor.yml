name: Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - production
          - staging
        default: production

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  alert-checks:
    name: Alert checks
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run black-box alert checks
        env:
          ALERT_BASE_URL: ${{ vars.CD_PUBLIC_API_URL || secrets.CD_PUBLIC_API_URL }}
          ALERT_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          ALERT_TIMEOUT: ${{ vars.ALERT_TIMEOUT || 10 }}
          ALERT_MAX_LATENCY_MS: ${{ vars.ALERT_MAX_LATENCY_MS || 1500 }}
          ALERT_LATENCY_SAMPLES: ${{ vars.ALERT_LATENCY_SAMPLES || 3 }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: python3 scripts/ops/check-alerts.py --json-out alert-result.json

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: alert-result
          path: alert-result.json
          retention-days: 14
